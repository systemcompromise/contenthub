version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contenthub_api
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=crud_db
      - DB_USER=postgres
      - DB_PASS=secret
      - APP_ENV=development
      - FRONTEND_URL=http://localhost:5500
      - ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500
    depends_on:
      db:
        condition: service_healthy
    networks:
      - contenthub_network

  db:
    image: postgres:15-alpine
    container_name: contenthub_postgres
    environment:
      POSTGRES_DB: crud_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contenthub_network

volumes:
  postgres_data:

networks:
  contenthub_network:
    driver: bridge